<html>
    <head>
        <title>Mrs. Smith's Class</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!--In line style will take precedence.
            External and Internal Styling is determined by the order in which they appear in the head tag.
        -->
        <link href="Styles/Basic Styling.css" rel="stylesheet" type="text/css">   
        <style>
            /*CSS styling code that corresponds to each HTML block. We experimented with the pseudo classes which can change the color when hovered over, whether or not the user has opened the link before, etc. */
            h1 {
                text-align: center;  
                font-size: 50px;  
            }
            h3 {
                text-align: center; 
                font-size: 35px;         
            }
            img{
              display: block;
              margin-left: auto;
              margin-right: auto;    
              width: 50%;  
            }
            p {
                text-align: center; 
                font-size: 30px;  
            }
            nav {
                text-align: center; 
                font-size: 25px;          
            }   
        </style> 
    </head>
    <body> 
        <!--HTML block with corresponding attributes. Image has the source of schoolbooks. We set the target attribute, which can open each link in a new tab. Title attribute is displayed when the user hovers over the link. -->
        <h1>Welcome</h1><br>
        <h3>To Mrs. Smith's Fourth Grade Class!</h3>  
        <img src="Images/School.jpg" alt="books" width= "100" height="400">         
        <p id="p">This is going to be a great year! Click on the links below for more information.</p> 
        <nav>
            <a href="homework.html" title="Class Homework" target="_blank"> Homework</a> 
            ||
            <a href="calendar.html" title="Class Calendar" target="_blank"> Calendar</a>
            ||
            <a href="Mailto: nobody.yahoo.com" title="Contact Us" target="_blank"> Contact Us</a>       
        </nav> 
    </body>
</html>
