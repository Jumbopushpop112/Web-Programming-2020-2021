<html>
    <head>
        <title>Normal Flow Exercise</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            /*Basic CSS Code that sets the styles accordingly. Very basic code. */
            p {   
                width: 15%; 
                bottom: 2px; 
                border-width: 2px;
                border: solid;
            }
       </style>
    </head>
    <body>
        <!--Simple HTML code. That displays the paragraphs on the screen, with the according attributes in the p{}. -->
        <p>Here is paragraph <b>one</b>. This will be at the top of the page.</p> 
        <p>Here is paragraph <b>two</b>. This will be in the middle page.</p>
        <p>Here is paragraph <b>three</b>. This will be at the bottom of the page.</p> 
    </body>
</html>
