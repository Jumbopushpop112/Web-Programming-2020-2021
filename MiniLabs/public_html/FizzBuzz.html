<html>
    <head>
        <title>Fizz Buzz</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
         <!--JavaScript code that loops through the numbers. Using if statements to see if the iterator variable is a multiple.-->
        <script>
            for(var i = 1; i<101; i++)  
            { 
                if(i % 5 === 0 && i % 3 === 0) 
                {
                   console.log(i + " FizzBuzz");
                }
                else if(i % 3 === 0) 
                {
                   console.log(i + " Fizz");  
                }
                else if(i % 5 === 0) 
                {
                   console.log(i + " Buzz"); 
                }
                else
                {
                  console.log(i);  
                }
            }
        </script>    
    </body>
</html>
