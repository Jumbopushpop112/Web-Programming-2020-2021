<html>
    <head>
        <title>Sum of the multiples</title> 
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <script>
           //JavaScript code that loops through the numbers and checks to see if they are multiples. If so, it adds them to the sum variable.
           var sum = 0;
           for(var i = 0; i< 1000; i++) 
           {
              if(i % 3 === 0 && i % 5 === 0)
              {
                  sum = sum + i;
              }
           }
           console.log(sum); 
        </script>
    </body>
</html>
