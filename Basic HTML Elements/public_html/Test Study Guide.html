<html>
    <head>
        <title></title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            /*CSS code to apply to the certain elements.*/ 
            body {
                
                background-color: maroon; 
            }
            p::first-letter {
               font-size: 28px;     
               color:blue;  
            }
            h1              { 
               font-size: 60px;   
               color: yellow; 
               background-color: magenta;
               border-color: darkcyan;     
               border: solid;
               border-width: 5px; 
            }
            h2::first-letter { 
                font-size: 60px;  
                color: yellow;  
            }
            h3 {
                
                background-color: lime; 
                border: solid;
                border-width: 5px;    
                border-color: cyan;     
                color:black; 
            }
        </style>
    </head>
    <body>
        <!--Body class that hosts the HTML code.--> 
        <p style="color:red;">This is a red paragraph.</p>    
        <h1>Hey there!</h1> 
        <h2> This is a header two.</h2>
        <h3>This is a header with the tomato color.</h3> 
    </body>
</html>
