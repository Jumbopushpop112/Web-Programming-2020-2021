<html>
    <head>
        <title>Final Exam</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            h1{
                text-align: center;
            }
            p{
                text-align: center;
                font-size: 20px;   
            }
            #ordering{
               margin-left: 40%;
               margin-bottom: 40%;
               position: absolute;
            }
            #clock{
               margin-left: 15%;
               position: relative; 
               max-width: 1000px;   
            }  
            #total{   
                margin-left: auto;
                margin-right: auto;
                display:grid;
                grid-template-columns: 25% 25%;
                column-gap:20px; 
            } 
        </style>
    </head>
    <body onload="init()">
        <h1>Matthew's Just in Time Donuts</h1>
        <p>All donuts 50 cents each, cake or glazed!</p>
       <section id="total">   
        <section id="ordering">
            <label for="name">Name:</label>
            <input type="text" id="guestName"><br><br>
            
            <label for="cakedonuts"># of cake donuts:</label>
            <input type="number" id="cakeDonuts"><br><br>
            
            <label for="glazedonuts"># of glazed donuts:</label>
            <input type="number" id="glazedDonuts"><br><br>
            
            <label for="minutes">Minutes till pickup:</label>
            <input type="number" id="pickupMinutes"><br><br>
            
            <label for="subtotal">Subtotal:</label>
            <input type="number" id="subTotal"><br><br>
            
            <label for="tax">Tax:</label>
            <input type="number" id="tax"><br><br>
            
            <label for="total">Total:</label>
            <input type="number" id="totalAmount"><br><br>
            
            <button type="button">Place Order</button><br><br>
        </section> 
        <img src="Images/Clock.jpg" id="clock">
       </section>
        <script> 
            function init(){
                document.getElementById("ordering").addEventListener("input", calculateTotal);
            } 
            function calculateTotal(){
                var cake = document.getElementById("cakeDonuts").value * 0.5;
                var glaze = document.getElementById("glazedDonuts").value *0.5;
                cake = parseFloat(cake);
                glaze = parseFloat(glaze); 
                var subTotal = cake + glaze;  
                var subTotalParse = subTotal.toFixed(2);
                document.getElementById("subTotal").value = subTotalParse; 
                var tax = subTotal * 0.07; 
                tax = parseFloat(tax);
                var taxRound = tax.toFixed(2); 
                document.getElementById("tax").value = taxRound;
                taxRound = parseFloat(taxRound);
                subTotalParse = parseFloat(subTotalParse);
                var total = subTotalParse + taxRound; 
                var finalTotal = total.toFixed(2);  
                document.getElementById("totalAmount").value = finalTotal; 
            } 
        </script>
    </body>
</html>
