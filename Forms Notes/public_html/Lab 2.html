<html>
    <head>
        <title>Lab 2 HTML Forms</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <!--HTML form code that displays accordingly using various tags. -->
        <form action="someFileName.aspx" method="get">
            <fieldset>
                <legend><i>Contact Information</i></legend>
                
                <section>
                   <label for="fname">First Name:</label> 
                   <input id="fname" type="text" name="name" size="30" maxlength="15">
                </section>
                
                <section>
                  <label for="fname">Last Name:</label>
                  <input id="fname" type="text" name="name" size="30" maxlength="15">
                </section>
                
                <section>
                    <label for="email">Email:</label>
                    <input id="emailUsers" type="email" name="name" size="30" maxlength="28">
                </section> 
            </fieldset>     
        </form>
        <form action="someFileName.aspx" method="get">
            <fieldset>
                <legend><i>Competition Question</i></legend>
                <section>How tall is the Eiffel Tower in Paris?</section>
                <input type="radio" checked="checked" name="radio">
                   <label for="typeRadio">584 ft</label>
                <section><input type="radio" checked="checked" name="radio">
                   <label for="typeRadio">784 ft</label>
                </section>   
                <section><input type="radio" checked="checked" name="radio">
                   <label for="typeRadio">984 ft</label>
                </section>
                <section><input type="radio" checked="checked" name="radio">
                   <label for="typeRadio">1184 ft</label>
                </section>
              
            </fieldset>
        </form>
        <form action="someFileName.aspx" method="get">
            <fieldset>
                <legend><i>Tiebreaker Question</i></legend>
                <section>In 25 words or less, say why you would like to win $10,000:</section>
                <textarea name="txtComments" rows="15" cols="45" maxlength="25"></textarea>  
        </form>
        <form action="someFileName.aspx" method="get">
            <fieldset>
                <legend><i>Enter Competition</i></legend>
                <input type="submit" value="Enter Competition" name="btnSubmit"> 
            </fieldset>
        </form>    
    </body>
</html>
