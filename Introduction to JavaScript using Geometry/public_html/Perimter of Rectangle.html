<html>
    <head>
        <title>Perimeter of Rectangle</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body onload="init()">
         <h1>Enter 4 sides to calculate perimeter of rectangle</h1>
        <form>
           <label for="side1">Enter side of rectangle:</label>
           <input type="number" id="side" name="side"><br><br>
           <button type="button" name="calculatePerimeter" id="calculatePerimeter">Click to calculate perimeter</button><br><br>
           <label for="resultingPerimeter">Perimeter of the rectangle is</label>
           <input type="text" id="resultingPerimeter" name="resultingPerimeter">
           <script src="JavaScript/PerimeterRectangle.js"></script>
        </form>
    </body>
