<html>
    <head>
        <title>Area of Trapezoid</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body onload="init()">
        <!--Form that gets the area of a trapezoid -->
       <h1>Enter Base 1, Base 2 and height to calculate area of trapezoid</h1>
        <form>
           <label for="base1">Enter Base 1:</label>
           <input type="number" id="base1" name="fbase"><br><br>
           <label for="base2">Enter Base 2:</label>
           <input type="number" id="base2" name="sbase"><br><br>
           <label for="height">Enter Height of Trapezoid:</label>
           <input type="number" id="height" name="height"><br><br> 
           <button type="button" name="calculateArea" id="calculateTrapezoidArea">Click to calculate area</button><br><br>
           <label for="resultingArea">Area of the trapezoid is</label>
           <input type="text" id="trapezoidArea" name="trapezoidArea"> 
           <script src="JavaScript/AreaTrapezoid.js"></script>   
        </form>
    </body>
</html>
