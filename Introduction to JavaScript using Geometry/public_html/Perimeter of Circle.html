<html>
    <head>
        <title>Perimeter of Circle</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body onload="init()">
        <!--Form to get the perimeter of a circle -->
         <h1>Enter the radius to find the perimeter of the circle</h1>
        <form>
           <label for="radius">Enter radius</label>
           <input type="text" id="radius" name="radius"><br><br>
           <button type="button" name="calculatePerimeter" id="calculatePerimeter">Click to calculate perimeter</button><br><br>
           <label for="resultingArea">Perimeter of the circle is</label>
           <input type="text" id="resultingPerimeter" name="resultingPerimeter">
           <script src="JavaScript/PerimeterCircle.js"></script> 
        </form>
    </body>
</html>
