<html>
    <head>
        <title>Area of Triangle</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body onload="init()"> 
        <!--HTML code to get the area of a triangle -->
        <h1>Enter base and height to calculate area of triangle</h1>  
        <form> 
           <label for="base">Enter base:</label> 
           <input type="number" id="base" name="fside"><br><br>
           <label for="height">Enter height:</label>
           <input type="number" id="height" name="sside"><br><br>
           <button type="button" name="calculateArea" id="calculateArea">Click to calculate area of triangle</button><br><br>
           <label for="resultingArea">Area of the triangle is</label>
           <input type="text" id="resultingArea" name="resultingArea"> 
            <script src="JavaScript/AreaTriangle.js"></script>   
        </form>
    </body>
</html>
